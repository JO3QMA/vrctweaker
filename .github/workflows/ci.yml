name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend (for //go:embed)
        run: cd frontend && pnpm install --frozen-lockfile && pnpm run build

      - name: Verify gofmt
        run: |
          mapfile -t files < <(find . \
            \( -path './.gomodcache' -o -path './frontend' -o -path './vendor' -o -path './build' -o -path './.git' \) -prune -o \
            -name '*.go' -print)
          if [[ ${#files[@]} -eq 0 ]]; then echo "no Go sources found"; exit 1; fi
          out="$(gofmt -s -l "${files[@]}")"
          if [[ -n "$out" ]]; then echo "$out"; exit 1; fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Test
        run: go test -v -race -cover ./internal/...

  vue:
    name: Vue Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Prettier (check)
        run: cd frontend && pnpm exec prettier --check .

      - name: Lint
        run: cd frontend && pnpm run lint:ci

      - name: Type check
        run: cd frontend && pnpm exec vue-tsc --noEmit

      - name: Test
        run: cd frontend && pnpm run test

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: E2E Test
        run: cd frontend && pnpm run test:e2e
