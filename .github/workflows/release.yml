name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go.sum

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install Wails deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev build-essential pkg-config libglib2.0-dev mingw-w64

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Build frontend
        run: cd frontend && pnpm run build

      - name: Build Linux
        run: GOMODCACHE=$HOME/gomodcache wails build -platform linux/amd64

      - name: Build Windows
        run: GOMODCACHE=$HOME/gomodcache wails build -platform windows/amd64

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp vrchat-tweaker release/ 2>/dev/null || cp build/bin/vrchat-tweaker release/ 2>/dev/null || true
          cp vrchat-tweaker.exe release/ 2>/dev/null || cp build/bin/vrchat-tweaker.exe release/ 2>/dev/null || true
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
