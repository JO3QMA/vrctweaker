name: Feature request
description: 新機能や既存機能の改善提案
title: "[Feature]: "
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        用語は [CONTEXT.md](https://github.com/JO3QMA/vrctweaker/blob/main/CONTEXT.md) に合わせてください。
        大きな変更は背景と受け入れ条件を具体的に書くと、`ready-for-agent` / `ready-for-human` の判断がしやすくなります。

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 何を実現したいか（1〜3 文）
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: いま何が不便か、誰のどんな作業を助けるか
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: 期待する UX や振る舞い。UI のラフでも可
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: 完了とみなす条件（チェックリスト推奨）
      placeholder: |
        - [ ] …
        - [ ] `make test` / `make lint` がパスする
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: 検討した別案があれば
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: 関連する `CONTEXT.md` 節、`docs/adr/`、既存 Issue、feature ドキュメントなど
      placeholder: CONTEXT.md — Gallery scope / docs/adr/0001-...
    validations:
      required: false
