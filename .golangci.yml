version: "2"
linters:
  enable:
    - errcheck
    - staticcheck
    - govet
    - ineffassign
  disable:
    - bodyclose
    - noctx
  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable:
        - shadow
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - errcheck
